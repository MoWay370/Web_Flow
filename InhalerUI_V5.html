<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>呼吸流量監測</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:'Noto Sans TC',Arial,sans-serif;
background:#f7faf7;
margin:0;
}

.container{
max-width:800px;
margin:40px auto;
background:#fff;
border-radius:16px;
box-shadow:0 2px 8px #d0e2d0;
padding:32px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.chart-container{
position:relative;
aspect-ratio:2/1;
width:100%;
max-width:600px;
margin:0 auto;
}

.row{
display:flex;
gap:16px;
}

.row input{
flex:1;
padding:8px;
border:1px solid #cce0cc;
border-radius:6px;
}

.save-btn{
background:#1abc68;
color:#fff;
border:none;
border-radius:6px;
padding:10px 24px;
font-size:16px;
cursor:pointer;
margin-top:16px;
}

.login-btn,.connect-btn{
background:#4e7fff;
color:#fff;
border:none;
border-radius:6px;
padding:8px 18px;
font-size:15px;
cursor:pointer;
margin-bottom:12px;
}

.greeting{
font-size:1.2em;
margin-bottom:24px;
color:#1abc68;
}

.status{
font-size:18px;
margin:10px 0 0 0;
color:#1abc68;
}

.lights{
display:flex;
gap:16px;
margin:16px 0;
}

.light{
width:32px;
height:32px;
border-radius:50%;
background:#ccc;
border:2px solid #bbb;
}

.light.red{
background:#ff4b33;
box-shadow:0 0 8px #ff4b33;
}

.light.green{
background:#00ffe8;
box-shadow:0 0 8px #00ffe8;
}

.light.grey{
background:#ccc;
}

#usbHint{
margin-top:10px;
padding:10px;
background:#f0f8ff;
border-radius:6px;
color:#333;
border:1px solid #b2dfdb;
}

.image-row{
display:flex;
justify-content:center;
align-items:flex-end;
gap:18px;
margin:12px 0;
flex-wrap:wrap;
}

.imgbox{
display:flex;
flex-direction:column;
align-items:center;
}

.imgbox img{
height:270px;
width:auto;
object-fit:contain;
background:#f7faf7;
border-radius:10px;
box-shadow:0 1px 4px #e0e0e0;
max-width:280px;
}

.imgbox .caption{
font-size:14px;
color:#888;
margin-top:4px;
text-align:center;
}

#lungsBox{
display:none;
width:267px;
height:234px;
margin:24px auto 0;
position:relative;
background:#f7faf7;
border-radius:20px;
box-shadow:0 2px 8px #d0e2d0;
}

#lungsImg{
width:100%;
height:100%;
pointer-events:none;
}

#lungsFill{
position:absolute;
left:0;
bottom:0;
width:100%;
height:0%;
background:rgba(30,200,200,0.6);
transition:height 1s;
border-radius:0 0 36px 36px;
}

#lungsPercent{
position:absolute;
left:0;
right:0;
bottom:10px;
text-align:center;
color:#1abc68;
font-weight:bold;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>呼吸流量監測</h2>
</div>

<button class="login-btn" id="loginBtn">醫院登入</button>
<button class="connect-btn" id="connectBtn">連接裝置</button>

<div class="greeting hidden" id="greeting"></div>

<div id="usbHint">點擊名為USB Serial的裝置</div>
<div id="status" class="status"></div>

<div class="lights" id="lights">
<div class="light grey" id="light1"></div>
<div class="light grey" id="light2"></div>
<div class="light grey" id="light3"></div>
</div>

<div class="image-row" id="stepImages"></div>

<div class="chart-container" id="chartBox">
<canvas id="flowChart"></canvas>
</div>

<div id="lungsBox">
<img src="img/lungs.png" id="lungsImg">
<div id="lungsFill"></div>
<div id="lungsPercent"></div>
</div>

<div>
<span>流量：</span>
<span id="flowValue">0.00</span>
</div>

<div id="instruction" class="status"></div>

<div class="row" style="margin-top:20px;">
<input id="patientId" placeholder="病患編號">
<input id="patientName" placeholder="病患身分證字號">
</div>

<button class="save-btn" id="saveBtn">儲存資料</button>

</div>

<script>

const {createClient}=window.supabase;

const SUPABASE_URL='https://nwqbmvletfxarabeaivm.supabase.co'
const SUPABASE_ANON_KEY='sb_publishable_UlV7BQ7w-bmWVhALsfR9tA_qXAwDgYg'

const supabaseClient=createClient(SUPABASE_URL,SUPABASE_ANON_KEY)

const loginBtn=document.getElementById("loginBtn")
const greeting=document.getElementById("greeting")

async function checkLogin(){

const {data:{user}}=await supabaseClient.auth.getUser()

if(user){

loginBtn.textContent="已登入"
loginBtn.disabled=true
loginBtn.style.opacity="0.7"
loginBtn.style.cursor="not-allowed"

greeting.textContent=`Hello, ${user.email}`
greeting.classList.remove("hidden")

}else{

loginBtn.textContent="醫院登入"
loginBtn.disabled=false

greeting.classList.add("hidden")

}

}

loginBtn.onclick=function(){

if(loginBtn.disabled) return

window.location.href="login.html"

}

checkLogin()

supabaseClient.auth.onAuthStateChange(()=>checkLogin())

</script>

</body>
</html>
