<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>登入或註冊</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", "微軟正黑體", "PMingLiU", "新細明體", sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 350px;
      margin: 60px auto;
      background: #fff;
      border-radius: 8px;
      padding: 30px 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    h2 {
      text-align: center;
      margin-bottom: 18px;
      color: #1976d2;
    }
    input[type="text"], input[type="password"], input[type="email"] {
      width: 100%;
      padding: 10px;
      margin: 8px 0 16px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      transition: border-color 0.3s;
      box-sizing: border-box;
    }
    input.invalid { border-color: #ff4444; }
    button {
      width: 100%;
      padding: 10px;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover { background: #1565c0; }
    button:disabled { background: #b0bec5; cursor: not-allowed; }
    .toggle-link {
      display: block;
      text-align: center;
      margin-top: 12px;
      color: #1976d2;
      cursor: pointer;
      text-decoration: underline;
      user-select: none;
    }
    .hidden { display: none; }
    .message {
      text-align: center;
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 14px;
    }
    .error-message {
      color: #ff4444;
      background-color: #ffebee;
      border: 1px solid #ffcdd2;
    }
    .success-message {
      color: #00C851;
      background-color: #e8f5e9;
      border: 1px solid #c8e6c9;
    }
    .input-error {
      color: #ff4444;
      font-size: 12px;
      margin-top: -12px;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- 登入表單 -->
    <form id="login-form">
      <h2>登入</h2>
      <input type="email" id="login-email" placeholder="電子郵件" required />
      <div id="login-email-error" class="input-error">請輸入有效的電子郵件</div>

      <input type="password" id="login-password" placeholder="密碼" required />
      <div id="login-password-error" class="input-error">請輸入密碼</div>

      <button type="submit" id="login-button">登入</button>

      <!-- 注意：保留 inline onclick，但 function 會掛在 window，保證找得到 -->
      <span class="toggle-link" onclick="toggleForms()">沒有帳號？註冊</span>
      <div id="login-message" class="message"></div>
    </form>

    <!-- 註冊表單 -->
    <form id="register-form" class="hidden">
      <h2>註冊</h2>
      <input type="text" id="register-username" placeholder="用戶名稱（可略過）" />

      <input type="email" id="register-email" placeholder="電子郵件" required />
      <div id="register-email-error" class="input-error">請輸入有效的電子郵件</div>

      <input type="password" id="register-password" placeholder="密碼（至少 6 碼）" required />
      <div id="register-password-error" class="input-error">密碼至少需要6個字符</div>

      <button type="submit" id="register-button">註冊</button>

      <span class="toggle-link" onclick="toggleForms()">已有帳號？登入</span>
      <div id="register-message" class="message"></div>
    </form>
  </div>

  <script>
    // ----------------------------
    // 1) Supabase 初始化：永遠不使用 const supabase = ...（避免 already declared）
    // ----------------------------
    const { createClient } = window.supabase;

    // 你的 Supabase 專案（保持你原本這組）
    const SUPABASE_URL = 'https://jqdtlkxvyrrpnbkyiigg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxZHRsa3h2eXJycG5ia3lpaWdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgyNTAwMTksImV4cCI6MjA2MzgyNjAxOX0.6ufrl0cNDT1LZqge0yTEGzzJ4IlYYubtKis2_ewkERw';

    // ✅ 只建立一次 client（就算頁面因快取/重載也不會重複宣告）
    window.__sb = window.__sb || createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ✅ 以 sb 當作本頁唯一使用的 client 變數（不叫 supabase，徹底避開衝突）
    const sb = window.__sb;

    // ----------------------------
    // 2) UI 工具函式
    // ----------------------------
    function clearMessages() {
      const lm = document.getElementById('login-message');
      const rm = document.getElementById('register-message');
      lm.textContent = '';
      lm.className = 'message';
      rm.textContent = '';
      rm.className = 'message';
    }

    function clearInputErrors() {
      document.querySelectorAll('.input-error').forEach(el => (el.style.display = 'none'));
      document.querySelectorAll('input').forEach(el => el.classList.remove('invalid'));
    }

    function showError(elementId, message) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.className = 'message error-message';
    }

    function showSuccess(elementId, message) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.className = 'message success-message';
    }

    function showInputError(inputId, errorId, message) {
      document.getElementById(inputId).classList.add('invalid');
      const err = document.getElementById(errorId);
      err.textContent = message;
      err.style.display = 'block';
    }

    // ✅ inline onclick 一定找得到（避免 toggleForms is not defined）
    window.toggleForms = function toggleForms() {
      document.getElementById('login-form').classList.toggle('hidden');
      document.getElementById('register-form').classList.toggle('hidden');
      clearMessages();
      clearInputErrors();
    };

    // ----------------------------
    // 3) 登入
    // ----------------------------
    document.getElementById('login-form').onsubmit = async function (e) {
      e.preventDefault();
      clearMessages();
      clearInputErrors();

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-button');

      if (!email) {
        showInputError('login-email', 'login-email-error', '請輸入電子郵件');
        return;
      }
      if (!password) {
        showInputError('login-password', 'login-password-error', '請輸入密碼');
        return;
      }

      btn.disabled = true;
      btn.textContent = '登入中...';

      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;

        showSuccess('login-message', '登入成功，正在跳轉...');
        console.log('登入使用者：', data);

        // 配合 vercel.json rewrites：回到根目錄最穩
        setTimeout(() => {
          window.location.href = '/';
        }, 600);
      } catch (err) {
        showError('login-message', '登入失敗：' + (err?.message || err));
      } finally {
        btn.disabled = false;
        btn.textContent = '登入';
      }
    };

    // ----------------------------
    // 4) 註冊
    // ----------------------------
    document.getElementById('register-form').onsubmit = async function (e) {
      e.preventDefault();
      clearMessages();
      clearInputErrors();

      const username = document.getElementById('register-username').value.trim();
      const email = document.getElementById('register-email').value.trim();
      const password = document.getElementById('register-password').value;
      const btn = document.getElementById('register-button');

      if (!email) {
        showInputError('register-email', 'register-email-error', '請輸入電子郵件');
        return;
      }
      if (!password || password.length < 6) {
        showInputError('register-password', 'register-password-error', '密碼至少需要6個字符');
        return;
      }

      btn.disabled = true;
      btn.textContent = '註冊中...';

      try {
        const { data, error } = await sb.auth.signUp({
          email,
          password,
          options: {
            data: {
              display_name: username ? username : null
            }
          }
        });
        if (error) throw error;

        // 嘗試寫入 users 表（失敗也不擋註冊）
        try {
          if (data?.user?.id) {
            const { error: profileError } = await sb
              .from('users')
              .insert([{ id: data.user.id, username: username || null }]);
            if (profileError) throw profileError;
          }
        } catch (profileErr) {
          console.error('用戶資料寫入 users 表失敗（可忽略，不影響註冊）：', profileErr);
        }

        showSuccess('register-message', '註冊成功！請檢查您的電子郵件以確認帳號');
        console.log('註冊資料：', data);
      } catch (err) {
        showError('register-message', '註冊失敗：' + (err?.message || err));
      } finally {
        btn.disabled = false;
        btn.textContent = '註冊';
      }
    };

    // ----------------------------
    // 5) 即時驗證（可選但實用）
    // ----------------------------
    document.getElementById('login-email').addEventListener('input', function () {
      if (this.value) {
        this.classList.remove('invalid');
        document.getElementById('login-email-error').style.display = 'none';
      }
    });

    document.getElementById('login-password').addEventListener('input', function () {
      if (this.value) {
        this.classList.remove('invalid');
        document.getElementById('login-password-error').style.display = 'none';
      }
    });

    document.getElementById('register-email').addEventListener('input', function () {
      if (this.value) {
        this.classList.remove('invalid');
        document.getElementById('register-email-error').style.display = 'none';
      }
    });

    document.getElementById('register-password').addEventListener('input', function () {
      if (this.value && this.value.length >= 6) {
        this.classList.remove('invalid');
        document.getElementById('register-password-error').style.display = 'none';
      }
    });
  </script>
</body>
</html>
